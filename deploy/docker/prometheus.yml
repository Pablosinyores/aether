global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "aether-go"
    static_configs:
      - targets: ["aether-go:9090"]
  - job_name: "aether-rust"
    static_configs:
      - targets: ["aether-rust:9092"]
  # Self-scrape of Alertmanager so AlertmanagerDown can fire when the
  # alerting path is itself broken (e.g. config validation crashloop).
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
  # Local-dev scrape targets when binaries run on the host while only the
  # observability stack is in compose. host.docker.internal resolves from
  # inside the container to the Docker Desktop bridge gateway. Failures
  # here are expected in pure-compose deployments and harmless.
  - job_name: "aether-host-rust"
    static_configs:
      - targets: ["host.docker.internal:9092"]
  # The monitor binary defaults METRICS_PORT to 9090 (cmd/monitor/metrics.go);
  # scrape that port so the host-side run is reachable without an explicit
  # METRICS_PORT override. Mempool / MEV-Share counters land on this scrape.
  - job_name: "aether-host-monitor"
    static_configs:
      - targets: ["host.docker.internal:9090"]
