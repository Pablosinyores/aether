global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "aether-go"
    static_configs:
      - targets: ["aether-go:9090"]
  - job_name: "aether-rust"
    static_configs:
      - targets: ["aether-rust:9092"]
